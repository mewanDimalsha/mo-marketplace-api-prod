version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:15
    container_name: mo-db
    environment:
      POSTGRES_DB: mo_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres' ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mo-api
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: password
      DB_NAME: mo_marketplace
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: